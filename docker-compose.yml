services:
  redis:
    # Redis is used by Celery as broker and backend for task queueing
    # Alpine image keeps the container lightweight for local development
    # Enterprise: use a hosted Redis service or a hardened production image with persistence and auth
    image: redis:7-alpine
    container_name: causal_redis
    ports:
      # Expose Redis on the host so the API worker can connect via localhost:6379
      - "6379:6379"

  postgres:
    # PostgreSQL provides durable relational storage for future persistent data
    # Alpine image keeps the database small and easy to run locally
    # Enterprise: use managed Postgres (RDS/Azure Database/Cloud SQL) or a production-grade image with backups and monitoring
    image: postgres:15-alpine
    container_name: causal_postgres
    environment:
      # Database credentials for local development
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: enterprise_dw
    ports:
      # Expose Postgres to the host machine for local access and debugging
      - "5432:5432"
    volumes:
      # Persist database data across restarts and container recreations
      - pgdata:/var/lib/postgresql/data

  redpanda:
    # Kafka-compatible broker for the Phase 3 event-driven layer (local dev).
    # Speaks the Kafka protocol, so the same client code runs against this
    # locally and against a managed Kafka (e.g. Upstash) in deployment — only
    # KAFKA_BOOTSTRAP_SERVERS / SASL settings change. Two listeners: one for
    # other containers on the compose network (redpanda:29092) and one for host
    # processes such as the dev producer/consumer (localhost:19092).
    image: redpandadata/redpanda:v24.2.7
    container_name: causal_redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=INTERNAL://redpanda:29092,EXTERNAL://localhost:19092
    ports:
      - "19092:19092"

  r_sandbox:
    # Isolated polyglot execution service. Runs untrusted, LLM-generated R code
    # in a container with no database credentials and no access to the LLM.
    #
    # Hardening (the R process holds the extracted rows — the sensitive asset —
    # so containment matters as much as credential isolation):
    #   * cap_drop ALL, re-adding only NET_ADMIN so the entrypoint can install the
    #     egress firewall; nothing else is permitted.
    #   * SANDBOX_NETWORK_ISOLATION=1 -> entrypoint sets OUTPUT policy DROP, so a
    #     script cannot exfiltrate the data over the network (it can still be
    #     reached by the orchestrator — that is inbound/established traffic).
    #   * read-only rootfs; the only writable paths are tmpfs (per-request R
    #     scripts/CSVs and temp), which are wiped and never touch disk.
    #   * no-new-privileges, a pids cap, and a memory cap bound a runaway script.
    # In a multi-host deploy prefer denying egress at the network layer too (an
    # internal-only network); the in-container firewall is the portable default.
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    container_name: causal_r_sandbox
    environment:
      SANDBOX_WORKSPACE: /sandbox/workspace
      SANDBOX_EXEC_TIMEOUT: "120"
      # Max decoded CSV size accepted by /execute (inline data transport).
      SANDBOX_MAX_CSV_BYTES: "26214400"
      # 1 = entrypoint denies network egress; 0 only if egress is blocked
      # externally (e.g. an internal-only network). Fails closed when it cannot
      # apply the rule, rather than running untrusted R with the network open.
      SANDBOX_NETWORK_ISOLATION: "1"
    ports:
      # Bound to loopback only: /execute runs arbitrary LLM-generated R, so the
      # endpoint must not be reachable from other hosts. The orchestrator runs on
      # this machine and reaches it via 127.0.0.1:8001. When the worker is itself
      # containerised, drop this mapping entirely and use `expose: ["8001"]` so
      # the port lives solely on the internal compose network.
      - "127.0.0.1:8001:8001"
    read_only: true
    tmpfs:
      - /sandbox/workspace:mode=1777
      - /tmp:mode=1777
    cap_drop:
      - ALL
    cap_add:
      # Only to install the OUTPUT-DROP firewall rule at startup.
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1g

volumes:
  # Named volume for durable Postgres storage
  pgdata:
